<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avis clients - Miam Fruits</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>
    <div class="logo-container">
        <img src="image/img2.jpg" alt="Miam Fruits" class="logo">
        <div class="brand"><span>By Nexa Event</span></div>
    </div>
    <nav id="navMenu">
        <a href="index.html#accueil">Accueil</a>
        <a href="index.html#produits">Produits</a>
        <a href="index.html#services">Evenements</a>
        <a href="avis.html" class="active-link">Avis</a>
        <a href="vote.html">Vote</a>
        <a href="index.html#contact">Contact</a>
    </nav>
    <div class="menu-toggle" id="menuToggle">&#9776;</div>
</header>

<main>

<section class="page-hero avis-hero">
    <div class="overlay"></div>
    <div class="page-hero-content">
        <span class="section-tag">VOTRE EXPÉRIENCE</span>
        <h1>Votre expérience compte</h1>
        <p>Quelques questions rapides pour nous aider à améliorer Miam Fruit.</p>
    </div>
</section>

<section class="feedback-section">

    <div class="feedback-card">
        <h2>Votre expérience</h2>

        <form id="reviewForm">

            <!-- Question 1 -->
            <label>Avez-vous apprécié la dégustation ?</label><br>
            <input type="radio" name="tasting" value="Oui" required> Oui
            <input type="radio" name="tasting" value="Non"> Non

            <br><br>

            <!-- Saveur -->
            <label>Quelle saveur préférez-vous ?</label>
            <select id="flavor" required>
                <option value="">Choisir une saveur</option>
                <option value="Mangue">Mangue</option>
                <option value="Ananas">Ananas</option>
                <option value="Fraise">Fraise</option>
                <option value="Banane">Banane</option>
                <option value="Mix fruits">Mix fruits</option>
            </select>

            <br><br>

            <!-- Note -->
            <label>Comment évaluez-vous le goût ? (1 à 5)</label><br>
            <select id="rating" required>
                <option value="">Choisir</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <br><br>

            <!-- Santé -->
            <label>Le produit vous semble-t-il sain ?</label><br>
            <input type="radio" name="healthy" value="Oui" required> Oui
            <input type="radio" name="healthy" value="Non"> Non

            <br><br>

            <!-- Achat -->
            <label>Seriez-vous prêt à acheter Miam Fruit ?</label><br>
            <input type="radio" name="buy" value="Oui" required> Oui
            <input type="radio" name="buy" value="Non"> Non

            <br><br>

            <!-- Commentaire -->
            <label>Un commentaire à ajouter ? (optionnel)</label>
            <textarea id="comment" placeholder="Votre avis en quelques mots..."></textarea>

            <br><br>

            <button type="submit">📲 Envoyer mon avis sur WhatsApp</button>

            <p id="note"></p>

        </form>
    </div>

</section>

</main>

<a class="whatsapp" href="https://wa.me/2250777228118" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<footer>
    <div class="copyright">&copy; 2026 Miam Fruits - By Nexa Event</div>
</footer>

<script>
const menuToggle = document.getElementById("menuToggle");
const navMenu = document.getElementById("navMenu");

menuToggle.addEventListener("click", () => {
    navMenu.classList.toggle("active");
});

// WhatsApp form
document.getElementById("reviewForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const tasting = document.querySelector('input[name="tasting"]:checked')?.value;
    const flavor = document.getElementById("flavor").value;
    const rating = document.getElementById("rating").value;
    const healthy = document.querySelector('input[name="healthy"]:checked')?.value;
    const buy = document.querySelector('input[name="buy"]:checked')?.value;
    const comment = document.getElementById("comment").value;

    const message =
`🍹 *NOUVEL AVIS MIAM FRUITS*

Aime la dégustation : ${tasting}
Saveur préférée : ${flavor}
Note goût : ${rating}/5
Produit sain : ${healthy}
Prêt à acheter : ${buy}
Commentaire : ${comment || "Aucun"}

Merci !`;

    const phone = "2250777228118";
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");

    document.getElementById("note").textContent =
    "Merci ! Votre avis a été envoyé sur WhatsApp.";
});
</script>

</body>
</html>
